    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="BestiesCraft" />

    <!-- FIX 1: Preconnect to correct backend (was api.bestiescraft.in — wrong/dead domain) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://besties-craft-backend-1.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://besties-craft-backend-1.onrender.com" />

    <!-- FIX 2: Preload Playfair Display (used in hero h1) so LCP font doesn't block paint -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" />

    <!--
      NON-RENDER-BLOCKING font load:
      Uses media="print" trick — browser loads without blocking render,
      then onload swaps to media="all". Saves ~750ms on mobile.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      />
    </noscript>

    <!-- FIX 3: Critical inline CSS — renders correctly before fonts/JS arrive -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #faf7f2; }
      #root { min-height: 100vh; }
      /* Prevent CLS while fonts load — use system serif fallback that matches Playfair */
      body { font-family: 'Lato', Georgia, sans-serif; }
      h1, h2, h3 { font-family: 'Playfair Display', Georgia, serif; }
      /* FIX 4: Reserve hero height on mobile so no CLS on load */
      .hp-hero { min-height: 320px; }
      /* Spinner shown by PageLoader while JS chunk loads */
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "OnlineStore",
      "name": "Besties Craft",
      "url": "https://www.bestiescraft.in",
      "logo": "https://www.bestiescraft.in/og-image.jpg",
      "description": "100% handmade crochet bracelets, woollen flowers, keychains, hair accessories and gifting items crafted with love in Varanasi, India.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Varanasi",
        "addressRegion": "Uttar Pradesh",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-8810776486",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": ["https://www.instagram.com/bestiescraft.in"]
    }
    </script>
  </head>

    <div id="root"></div>
